services:
  web01:
    image: nginx:alpine
    container_name: web01
    ports:
      - "4000:80"
    volumes:
      - ../src/web01:/usr/share/nginx/html:ro

  web02:
    image: nginx:alpine
    container_name: web02
    ports:
      - "4001:80"
    volumes:
      - ../src/web02:/usr/share/nginx/html:ro
